name: Offline Package Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/offline-package.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "src-tauri/**"
      - "src/**"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  macos-package:
    name: macOS offline package (${{ matrix.libreoffice_label }})
    runs-on: macos-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: without-libreoffice
            libreoffice_label: without LibreOffice
            soffice_present: false
          - variant: with-libreoffice
            libreoffice_label: with LibreOffice
            soffice_present: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-cargo-registry-

      - name: Cache tesseract-rs build output
        uses: actions/cache@v4
        with:
          path: ~/Library/Application Support/tesseract-rs
          key: macos-tesseract-rs-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-tesseract-rs-

      - name: Install dependencies
        run: npm ci

      - name: Remove bundled LibreOffice runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/libreoffice
          rm -rf src-tauri/resources/libreoffice/LibreOffice.app

      - name: Install LibreOffice runtime
        if: matrix.variant == 'with-libreoffice'
        shell: bash
        run: |
          set -euo pipefail
          brew install --cask libreoffice

      - name: Prepare bundled LibreOffice runtime
        if: matrix.variant == 'with-libreoffice'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/libreoffice
          ditto /Applications/LibreOffice.app src-tauri/resources/libreoffice/LibreOffice.app
          test -x src-tauri/resources/libreoffice/LibreOffice.app/Contents/MacOS/soffice

      - name: Validate offline package workflow
        run: npm run test:node-scripts

      - name: Build macOS offline bundle
        run: npm run tauri:build:offline:ci

      - name: Re-sign macOS bundle with LibreOffice
        if: matrix.variant == 'with-libreoffice'
        shell: bash
        run: |
          set -euo pipefail
          app="src-tauri/target/release/bundle/macos/Rustitler.app"
          dmg_dir="src-tauri/target/release/bundle/dmg"
          dmg_path="$(find "$dmg_dir" -maxdepth 1 -name '*.dmg' -print -quit)"

          if [[ -z "$dmg_path" ]]; then
            echo "No generated DMG found under $dmg_dir." >&2
            exit 1
          fi

          codesign --force --deep --sign - "$app"
          rm -f "$dmg_path"
          "$dmg_dir/bundle_dmg.sh" \
            --volname Rustitler \
            --volicon "$dmg_dir/icon.icns" \
            --icon Rustitler.app 128 128 \
            --hide-extension Rustitler.app \
            --app-drop-link 375 128 \
            --no-internet-enable \
            "$dmg_path" \
            src-tauri/target/release/bundle/macos

      - name: Run packaged macOS smoke test
        shell: bash
        run: |
          set -euo pipefail
          app="src-tauri/target/release/bundle/macos/Rustitler.app"
          binary="$app/Contents/MacOS/Rustitler"
          resource_dir="$app/Contents/Resources"
          smoke_report="$RUNNER_TEMP/rustitler-offline-smoke-report-macos-${{ matrix.variant }}.json"
          expected_soffice="${{ matrix.soffice_present }}"

          test -x "$binary"
          test -f "$resource_dir/tessdata/chi_sim.traineddata"
          test -f "$resource_dir/pdfium/libpdfium.dylib"

          "$binary" \
            --offline-smoke-test \
            --resource-dir "$resource_dir" \
            --app-data-dir "$RUNNER_TEMP/rustitler-smoke-data-${{ matrix.variant }}" \
            --report-path "$smoke_report" \
            --require-ocr

          node - "$smoke_report" "$expected_soffice" <<'NODE'
          const fs = require("node:fs");
          const [reportPath, expectedRaw] = process.argv.slice(2);
          const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
          const expected = expectedRaw === "true";
          if (report.checks.pdfiumPresent !== true) {
            throw new Error(
              `Expected pdfiumPresent=true, got ${report.checks.pdfiumPresent}`,
            );
          }
          if (report.checks.sofficePresent !== expected) {
            throw new Error(
              `Expected sofficePresent=${expected}, got ${report.checks.sofficePresent}`,
            );
          }
          NODE

          {
            echo "## macOS Offline Smoke Report (${{ matrix.libreoffice_label }})"
            echo
            echo '```json'
            cat "$smoke_report"
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify macOS DMG
        shell: bash
        run: |
          set -euo pipefail
          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg_path"
          hdiutil verify "$dmg_path"

      - name: Generate macOS package size report
        run: |
          npm run package:size-report -- \
            --platform "macos-${{ matrix.variant }}" \
            --output "$RUNNER_TEMP/rustitler-package-size-report-macos-${{ matrix.variant }}.md"

      - name: Upload macOS package artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rustitler-macos-offline-package-${{ matrix.variant }}
          path: |
            src-tauri/target/release/bundle
            ${{ runner.temp }}/rustitler-offline-smoke-report-macos-${{ matrix.variant }}.json
            ${{ runner.temp }}/rustitler-package-size-report-macos-${{ matrix.variant }}.md
          if-no-files-found: warn

  windows-package:
    name: Windows offline package (${{ matrix.libreoffice_label }})
    runs-on: windows-latest
    timeout-minutes: 210
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: without-libreoffice
            libreoffice_label: without LibreOffice
            soffice_present: false
          - variant: with-libreoffice
            libreoffice_label: with LibreOffice
            soffice_present: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-registry-

      - name: Cache tesseract-rs build output
        uses: actions/cache@v4
        with:
          path: ~\AppData\Roaming\tesseract-rs
          key: windows-tesseract-rs-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-tesseract-rs-

      - name: Install dependencies
        run: npm ci

      - name: Remove bundled LibreOffice runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $resourceDir = "src-tauri\resources\libreoffice"
          New-Item -ItemType Directory -Force $resourceDir | Out-Null
          Get-ChildItem $resourceDir -Force -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -ne ".gitkeep" } |
            Remove-Item -Recurse -Force

      - name: Install LibreOffice runtime
        if: matrix.variant == 'with-libreoffice'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install libreoffice-fresh -y --no-progress

      - name: Prepare bundled LibreOffice runtime
        if: matrix.variant == 'with-libreoffice'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $source = @(
            "C:\Program Files\LibreOffice",
            "C:\Program Files (x86)\LibreOffice"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $source) {
            throw "Installed LibreOffice directory was not found."
          }

          $target = "src-tauri\resources\libreoffice"
          New-Item -ItemType Directory -Force $target | Out-Null
          Copy-Item -Path (Join-Path $source "*") -Destination $target -Recurse -Force

          $soffice = Join-Path $target "program\soffice.exe"
          if (-not (Test-Path $soffice)) {
            throw "Bundled soffice.exe was not copied to $soffice."
          }

      - name: Validate offline package workflow
        run: npm run test:node-scripts

      - name: Build Windows offline bundle
        run: npm run tauri:build:offline:ci

      - name: Install packaged Windows bundle
        id: install
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installDir = Join-Path $env:RUNNER_TEMP "RustitlerInstall-${{ matrix.variant }}"
          New-Item -ItemType Directory -Force $installDir | Out-Null

          $installer = Get-ChildItem "src-tauri\target\release\bundle\nsis" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer was not produced under src-tauri\target\release\bundle\nsis."
          }

          $process = Start-Process `
            -FilePath $installer.FullName `
            -ArgumentList "/S", "/D=$installDir" `
            -Wait `
            -PassThru
          if ($process.ExitCode -ne 0) {
            throw "NSIS installer failed with exit code $($process.ExitCode)."
          }

          $exe = Get-ChildItem $installDir -Recurse -Filter "Rustitler.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "Installed Rustitler.exe was not found under $installDir."
          }

          $trainedData = Get-ChildItem $installDir -Recurse -Filter "chi_sim.traineddata" | Select-Object -First 1
          if (-not $trainedData) {
            throw "Installed chi_sim.traineddata was not found under $installDir."
          }

          $resourceDir = Split-Path (Split-Path $trainedData.FullName -Parent) -Parent
          $pdfium = Join-Path $resourceDir "pdfium\pdfium.dll"
          if (-not (Test-Path $pdfium)) {
            throw "Installed pdfium.dll was not found at $pdfium."
          }

          "exe=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "resource_dir=$resourceDir" >> $env:GITHUB_OUTPUT

      - name: Run packaged Windows smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $smokeReport = Join-Path $env:RUNNER_TEMP "rustitler-offline-smoke-report-windows-${{ matrix.variant }}.json"
          $appDataDir = Join-Path $env:RUNNER_TEMP "rustitler-smoke-data-${{ matrix.variant }}"
          $env:RUSTITLER_SMOKE_REPORT_PATH = $smokeReport

          $arguments = @(
            "--offline-smoke-test",
            "--resource-dir", "${{ steps.install.outputs.resource_dir }}",
            "--app-data-dir", $appDataDir,
            "--report-path", $smokeReport,
            "--require-ocr"
          )
          $process = Start-Process `
            -FilePath "${{ steps.install.outputs.exe }}" `
            -ArgumentList $arguments `
            -Wait `
            -PassThru
          $exitCode = $process.ExitCode

          if ($null -ne $exitCode -and $exitCode -ne 0) {
            throw "Packaged Windows smoke test failed with exit code $exitCode."
          }

          for ($attempt = 0; $attempt -lt 30; $attempt++) {
            if (Test-Path $smokeReport) {
              break
            }
            Start-Sleep -Seconds 1
          }
          if (-not (Test-Path $smokeReport)) {
            throw "Packaged Windows smoke test did not write $smokeReport."
          }

          $report = Get-Content $smokeReport -Raw | ConvertFrom-Json
          if ($report.status -ne "ok") {
            throw "Packaged Windows smoke test reported status '$($report.status)'."
          }

          if ([bool]$report.checks.pdfiumPresent -ne $true) {
            throw "Expected pdfiumPresent=true, got $($report.checks.pdfiumPresent)."
          }

          $expectedSofficePresent = [System.Convert]::ToBoolean("${{ matrix.soffice_present }}")
          if ([bool]$report.checks.sofficePresent -ne $expectedSofficePresent) {
            throw "Expected sofficePresent=$expectedSofficePresent, got $($report.checks.sofficePresent)."
          }

          Add-Content $env:GITHUB_STEP_SUMMARY "## Windows Offline Smoke Report (${{ matrix.libreoffice_label }})"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY '```json'
          Get-Content $smokeReport | Add-Content $env:GITHUB_STEP_SUMMARY
          Add-Content $env:GITHUB_STEP_SUMMARY '```'

      - name: Generate Windows package size report
        shell: pwsh
        run: |
          $sizeReport = Join-Path $env:RUNNER_TEMP "rustitler-package-size-report-windows-${{ matrix.variant }}.md"
          npm run package:size-report -- `
            --platform "windows-${{ matrix.variant }}" `
            --output $sizeReport
          if (-not (Test-Path $sizeReport)) {
            throw "Windows package size report was not written to $sizeReport."
          }
          Get-Content $sizeReport

      - name: Upload Windows package artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rustitler-windows-offline-package-${{ matrix.variant }}
          path: |
            src-tauri/target/release/bundle
            ${{ runner.temp }}/rustitler-offline-smoke-report-windows-${{ matrix.variant }}.json
            ${{ runner.temp }}/rustitler-package-size-report-windows-${{ matrix.variant }}.md
          if-no-files-found: warn

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - macos-package
      - windows-package
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')

    steps:
      - name: Checkout release scripts
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release assets
        run: |
          node scripts/collect-release-assets.mjs \
            --input release-artifacts \
            --output release-assets \
            --product-name Rustitler \
            --tag "$GITHUB_REF_NAME"

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_file="$RUNNER_TEMP/release-notes.md"
          {
            echo "Rustitler ${tag}"
            echo
            echo "Offline package validation artifacts from GitHub Actions."
            echo
            echo "- macOS and Windows bundles were built with \`offline-bundle\`."
            echo "- Packaged-binary smoke tests verified bundled OCR assets, image OCR, settings, history, and LibreOffice presence per variant."
            echo "- Release assets include four installers: macOS and Windows, each with and without bundled LibreOffice."
            echo "- Assets ending in \`with-libreoffice\` include the LibreOffice runtime for offline legacy \`.doc\` conversion."
            echo "- Assets ending in \`without-libreoffice\` omit LibreOffice and rely on a system LibreOffice install for legacy \`.doc\` conversion."
          } > "$notes_file"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* \
              --title "$tag" \
              --notes-file "$notes_file"
          fi
